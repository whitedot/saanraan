<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      text { font-family: "Droid Sans Fallback", "DejaVu Sans", sans-serif; fill: #172033; }
      .title { font-size: 36px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #5b667a; }
      .lane-title { font-size: 22px; font-weight: 700; fill: #0f172a; }
      .box-title { font-size: 19px; font-weight: 700; }
      .box-text { font-size: 15px; fill: #475569; }
      .small { font-size: 13px; fill: #64748b; }
      .lane { fill: #f8fafc; stroke: #d9e2ef; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #b9c7db; stroke-width: 2; rx: 14; }
      .decision { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; }
      .success { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; rx: 14; }
      .error { fill: #fef2f2; stroke: #f87171; stroke-width: 2; rx: 14; }
      .audit { fill: #eef2ff; stroke: #818cf8; stroke-width: 2; rx: 14; }
      .arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .note { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.5; rx: 12; }
    </style>
  </defs>

  <rect width="1600" height="1080" fill="#ffffff"/>
  <text x="80" y="70" class="title">회원 그룹별 수동 자산 조정 정책 흐름</text>
  <text x="80" y="105" class="subtitle">포인트 / 적립금 / 예치금 관리자 수동 조정에 적용되는 1차 구현 동작</text>

  <rect x="60" y="145" width="450" height="810" class="lane"/>
  <rect x="575" y="145" width="450" height="810" class="lane"/>
  <rect x="1090" y="145" width="450" height="810" class="lane"/>

  <text x="90" y="190" class="lane-title">1. 정책 설정</text>
  <text x="605" y="190" class="lane-title">2. 수동 조정 저장</text>
  <text x="1120" y="190" class="lane-title">3. 원장 및 감사 로그</text>

  <rect x="105" y="225" width="360" height="88" class="box"/>
  <text x="130" y="258" class="box-title">관리자가 설정 화면 진입</text>
  <text x="130" y="286" class="box-text">/admin/points/settings</text>
  <text x="130" y="307" class="box-text">/admin/rewards/settings, /deposits/settings</text>

  <path d="M285 313 L285 360" class="arrow"/>
  <rect x="105" y="360" width="360" height="102" class="box"/>
  <text x="130" y="393" class="box-title">정책 행 입력</text>
  <text x="130" y="421" class="box-text">회원 그룹, 계산 방식, 조정값</text>
  <text x="130" y="443" class="box-text">우선순위, 상태</text>

  <path d="M285 462 L285 510" class="arrow"/>
  <polygon points="285,510 450,585 285,660 120,585" class="decision"/>
  <text x="214" y="577" class="box-title">서버 검증</text>
  <text x="180" y="604" class="box-text">형식, 그룹, mode/value</text>

  <path d="M285 660 L285 715" class="arrow"/>
  <rect x="105" y="715" width="360" height="96" class="success"/>
  <text x="130" y="748" class="box-title">모듈 설정 저장</text>
  <text x="130" y="776" class="box-text">sr_module_settings</text>
  <text x="130" y="798" class="box-text">자산 모듈이 정책을 소유</text>

  <path d="M120 585 C70 585 70 850 120 850" class="arrow"/>
  <rect x="135" y="825" width="300" height="72" class="error"/>
  <text x="160" y="856" class="box-title">오류 시 저장 중단</text>
  <text x="160" y="883" class="box-text">중복 그룹, 잘못된 값 등</text>

  <rect x="620" y="225" width="360" height="88" class="box"/>
  <text x="645" y="258" class="box-title">관리자가 잔액 화면에서 조정</text>
  <text x="645" y="286" class="box-text">회원, 거래 유형, 기본 금액 입력</text>

  <path d="M800 313 L800 360" class="arrow"/>
  <polygon points="800,360 965,435 800,510 635,435" class="decision"/>
  <text x="720" y="428" class="box-title">환불 거래인가?</text>
  <text x="715" y="455" class="box-text">원거래 복구 성격</text>

  <path d="M965 435 L1110 435" class="arrow"/>
  <rect x="1130" y="385" width="360" height="88" class="box"/>
  <text x="1155" y="418" class="box-title">환불은 정책 미적용</text>
  <text x="1155" y="446" class="box-text">입력 금액 그대로 거래 생성</text>

  <path d="M800 510 L800 565" class="arrow"/>
  <rect x="620" y="565" width="360" height="96" class="box"/>
  <text x="645" y="598" class="box-title">회원의 현재 활성 그룹 조회</text>
  <text x="645" y="626" class="box-text">member 모듈이 없거나 비활성이면</text>
  <text x="645" y="648" class="box-text">기본 금액 그대로 사용</text>

  <path d="M800 661 L800 715" class="arrow"/>
  <polygon points="800,715 965,790 800,865 635,790" class="decision"/>
  <text x="707" y="783" class="box-title">매칭 정책 있음?</text>
  <text x="690" y="810" class="box-text">활성 그룹 + 활성 정책</text>

  <path d="M635 790 L505 790" class="arrow"/>
  <rect x="200" y="745" width="280" height="90" class="success"/>
  <text x="225" y="778" class="box-title">없으면 기본 금액</text>
  <text x="225" y="806" class="box-text">정책 스냅샷은 matched=false</text>

  <path d="M800 865 L800 918" class="arrow"/>
  <rect x="620" y="918" width="360" height="92" class="box"/>
  <text x="645" y="951" class="box-title">우선순위 1개 선택</text>
  <text x="645" y="979" class="box-text">priority 높은 정책</text>
  <text x="645" y="1001" class="box-text">동순위: policy_id, group_id 오름차순</text>

  <rect x="1130" y="525" width="360" height="122" class="box"/>
  <text x="1155" y="558" class="box-title">mode별 최종 금액 계산</text>
  <text x="1155" y="586" class="box-text">fixed: 부호 유지 + 고정 절대금액</text>
  <text x="1155" y="608" class="box-text">multiplier: 배율 후 소수점 버림</text>
  <text x="1155" y="630" class="box-text">delta: 지급은 +조정값, 차감은 -조정값</text>

  <path d="M980 964 C1040 964 1040 586 1130 586" class="arrow"/>
  <path d="M480 790 C1030 790 1030 586 1130 586" class="arrow"/>

  <path d="M1310 647 L1310 700" class="arrow"/>
  <polygon points="1310,700 1475,775 1310,850 1145,775" class="decision"/>
  <text x="1237" y="768" class="box-title">최종 금액 0?</text>
  <text x="1208" y="795" class="box-text">exempt / disabled 포함</text>

  <path d="M1145 775 L1070 775" class="arrow"/>
  <rect x="760" y="735" width="285" height="80" class="error"/>
  <text x="785" y="768" class="box-title">0이면 저장 차단</text>
  <text x="785" y="796" class="box-text">원장 거래를 만들지 않음</text>

  <path d="M1310 850 L1310 900" class="arrow"/>
  <rect x="1130" y="900" width="360" height="86" class="success"/>
  <text x="1155" y="933" class="box-title">원장 거래 생성</text>
  <text x="1155" y="961" class="box-text">실제 저장 금액 = 최종 금액</text>

  <path d="M1310 986 L1310 1018" class="arrow"/>
  <rect x="1130" y="1018" width="360" height="44" class="audit"/>
  <text x="1155" y="1047" class="box-title">감사 로그 metadata에 스냅샷 저장</text>

  <rect x="80" y="980" width="410" height="68" class="note"/>
  <text x="105" y="1008" class="small">정책은 core/member 테이블을 넓히지 않고</text>
  <text x="105" y="1030" class="small">각 자산 모듈 설정이 소유합니다.</text>
</svg>
