# Saanraan nginx subdirectory URL sample.
# Use this when the site is served below a URL prefix such as /saanraan/.
# Copy this server block into your nginx site config, then adjust:
# - server_name
# - root to the parent directory that contains the saanraan project directory
# - the /saanraan prefix if your URL prefix is different
# - fastcgi_pass for your PHP-FPM socket or host:port

server {
    listen 80;
    server_name example.com;

    # If files live in /var/www/example.com/saanraan and URLs start with
    # /saanraan/, root must be the parent: /var/www/example.com.
    root /var/www/example.com;
    index index.php;

    location = /saanraan {
        return 301 /saanraan/;
    }

    # Public assets. Keep executable/internal file blocking before the
    # generic asset locations.
    location ~ ^/saanraan/assets/.*\.(?:php[0-9]?|phtml|phar|sql)$ {
        return 403;
    }

    location = /saanraan/assets/fonts/material-symbols-outlined.ttf {
        default_type font/ttf;
        try_files $uri =404;
    }

    location /saanraan/assets/ {
        try_files $uri =404;
    }

    location ~ "^/saanraan/modules/[a-z][a-z0-9_]{1,39}/assets/.*\.(?:php[0-9]?|phtml|phar|sql)$" {
        return 403;
    }

    location ~ "^/saanraan/modules/[a-z][a-z0-9_]{1,39}/assets/" {
        try_files $uri =404;
    }

    location ~ "^/saanraan/modules/[a-z][a-z0-9_]{1,39}/skins/[a-z][a-z0-9_]{0,39}/.*\.(?:php[0-9]?|phtml|phar|sql)$" {
        return 403;
    }

    location ~ "^/saanraan/modules/[a-z][a-z0-9_]{1,39}/skins/[a-z][a-z0-9_]{0,39}/" {
        try_files $uri =404;
    }

    location = /saanraan/modules/ckeditor/vendor/ckeditor5/ckeditor5.umd.js {
        try_files $uri =404;
    }

    location = /saanraan/modules/ckeditor/vendor/ckeditor5/ckeditor5.css {
        try_files $uri =404;
    }

    # Generated public thumbnail cache only. Keep this before the generic
    # storage block below.
    location ~ "^/saanraan/storage/cache/thumbnails/[a-f0-9]{2}/[a-f0-9]{64}_[A-Za-z0-9_]+_[0-9]+\.(?:jpe?g|png|gif|webp)$" {
        try_files $uri =404;
    }

    location ~ "^/saanraan/storage/cache/thumbnails/[a-z][a-z0-9_]{1,39}/[a-f0-9]{2}/[a-f0-9]{64}_[A-Za-z0-9_]+_[a-f0-9]{16,64}\.(?:jpe?g|png|gif|webp)$" {
        try_files $uri =404;
    }

    # Internal project files must not be readable over HTTP.
    location ~ ^/saanraan/(?:config|core|database|docs|examples|storage|modules|\.git|\.tools|\.claude)(?:/|$) {
        return 403;
    }

    location ~ ^/saanraan/(?:AGENTS\.md|README\.md|LICENSE|\.gitignore|\.htaccess|\.env(?:\..*)?)$ {
        return 403;
    }

    # Virtual application paths go through the front controller.
    location /saanraan/ {
        try_files $uri $uri/ /saanraan/index.php?$query_string;
    }

    location = /saanraan/index.php {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME /saanraan/index.php;
        fastcgi_param PHP_SELF /saanraan/index.php;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
    }

    location ~ ^/saanraan/.*\.php$ {
        return 403;
    }
}
